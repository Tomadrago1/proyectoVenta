services:
  # --- SERVICIO DE BASE DE DATOS ---
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-negocio}
      MYSQL_USER: ${MYSQL_USER:-negocio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-negocio}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./back/src/database/bd.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- SERVICIO DE BACKEND (Node) ---
  backend:
    build: ./back
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER:-negocio}
      - DB_PASSWORD=${MYSQL_PASSWORD:-negocio}
      - DB_NAME=${MYSQL_DATABASE:-negocio}
      - JWT_SECRET=${JWT_SECRET}
      - LOCALHOST=${LOCALHOST:-http://192.168.100.5}
      - APP_SECRET=${APP_SECRET}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./front
    restart: always
    ports:
      - "80:80" # Ahora entramos por el puerto estándar web
      - "443:443" # Puerto HTTPS
    volumes:
      - /etc/ssl/certs/cloudflare_upscale.pem:/etc/ssl/certs/cloudflare_upscale.pem:ro
      - /etc/ssl/private/cloudflare_upscale.key:/etc/ssl/private/cloudflare_upscale.key:ro
    depends_on:
      - backend

  # --- SERVICIO DE BACKUP ---
  db-backup:
    image: databack/mysql-backup
    restart: always
    environment:
      DB_SERVER: db
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAMES: ${MYSQL_DATABASE:-negocio}
      DB_DUMP_CRON: "0 2 * * *" # Todos los días a las 2 AM
    volumes:
      - db_backups:/db
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  db_backups:
