services:
  # --- SERVICIO DE BASE DE DATOS ---
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-negocio}
      MYSQL_USER: ${MYSQL_USER:-negocio}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-negocio}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./back/src/database/bd.sql:/docker-entrypoint-initdb.d/init.sql

  # --- SERVICIO DE BACKEND (Node) ---
  backend:
    build: ./back
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${MYSQL_USER:-negocio}
      - DB_PASSWORD=${MYSQL_PASSWORD:-negocio}
      - DB_NAME=${MYSQL_DATABASE:-negocio}
      - JWT_SECRET=${JWT_SECRET}
      - LOCALHOST=http://192.168.100.5
      - APP_SECRET=${APP_SECRET}
    depends_on:
      - db

  frontend:
    build: ./front
    restart: always
    ports:
      - "80:80" # Ahora entramos por el puerto estándar web
    depends_on:
      - backend
volumes:
  db_data:

